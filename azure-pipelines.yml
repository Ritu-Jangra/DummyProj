trigger:
  branches:
    include:
      - master

pr: none

pool:
  vmImage: windows-latest

variables:
  buildConfiguration: Release

steps:
- task: UseDotNet@2
  inputs:
    packageType: sdk
    version: '8.x'

- task: DotNetCoreCLI@2
  inputs:
    command: restore
    projects: '**/*.sln'

- task: DotNetCoreCLI@2
  inputs:
    command: build
    projects: '**/*.sln'
    arguments: '--configuration $(buildConfiguration)'

- task: DotNetCoreCLI@2
  inputs:
    command: test
    projects: '**/*Tests/*.csproj'
    arguments: '--configuration $(buildConfiguration) --collect "Code Coverage"'